<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Sign Language Translator</title>
  <style>
    body { font-family: sans-serif; width: 320px; padding: 12px; }
    canvas { width: 100%; border: 1px solid #ddd; border-radius: 8px; }
    #transcript { margin-top: 8px; font-size: 13px; color: #444; min-height: 40px; }
  </style>
</head>
<body>
  <h3 style="margin:0 0 10px;">Sign Language Translator</h3>
  <div>
    <label>Source:
      <select id="source">
        <option value="tab">Tab audio</option>
        <option value="mic">Microphone</option>
        <option value="file">Upload file</option>
      </select>
    </label>
    <label style="margin-left:12px;">Language:
      <select id="lang">
        <option value="ASL">ASL</option>
        <option value="ISL">ISL</option>
      </select>
    </label>
  </div>
  <button id="startBtn" style="margin-top:10px; width:100%; padding:8px;">Start</button>
  <canvas id="avatarCanvas" height="240"></canvas>
  <div id="transcript">Transcript will appear here...</div>
  <script src="sidebar.js"></script>
</body>
</html>
