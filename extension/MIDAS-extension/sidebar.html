<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>MIDAS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b10;
      --surface: #13131c;
      --surface2: #1c1c28;
      --border: #2a2a40;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --danger: #ef4444;
      --success: #10b981;
      --glow: rgba(124,58,237,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 480px;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #0b0b10, #110f1e);
      position: relative;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 14px var(--glow);
      flex-shrink: 0;
    }
    .title {
      font-size: 18px; font-weight: 800;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, #fff, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 8px; color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 8px;
      font-size: 9px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
    }
    .dot.online  { background: var(--success); box-shadow: 0 0 5px var(--success); animation: blink 2s infinite; }
    .dot.offline { background: var(--danger);  box-shadow: 0 0 5px var(--danger); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Controls ── */
    .controls {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .control-label {
      font-size: 8px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      width: 100%;
    }
    select:focus { border-color: var(--accent); }

    /* ── Start Button ── */
    #startBtn {
      padding: 8px 14px;
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
      box-shadow: 0 2px 12px var(--glow);
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    #startBtn:hover { transform: translateY(-1px); box-shadow: 0 4px 18px var(--glow); }
    #startBtn.active {
      background: linear-gradient(135deg, var(--danger), #b91c1c);
      box-shadow: 0 2px 12px rgba(239,68,68,0.3);
      animation: recPulse 1.2s infinite;
    }
    @keyframes recPulse {
      0%,100% { box-shadow: 0 2px 12px rgba(239,68,68,0.3); }
      50%      { box-shadow: 0 2px 20px rgba(239,68,68,0.6); }
    }

    /* ── Avatar Canvas ── */
    .avatar-wrap {
      position: relative;
      margin: 12px 16px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      display: block;
    }
    .canvas-label {
      position: absolute;
      top: 8px; left: 10px;
      font-size: 8px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.12em;
    }
    .current-word {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      background: rgba(124,58,237,0.2);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 3px 12px;
      font-size: 13px;
      font-weight: 800;
      font-family: 'Space Mono', monospace;
      color: var(--accent2);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /* ── Waveform ── */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 22px;
      margin: 10px 16px 0;
    }
    .wbar {
      width: 3px; border-radius: 2px;
      background: var(--accent);
      height: 4px; opacity: 0.25;
      transition: height 0.1s;
    }
    .wbar.live { opacity: 1; animation: wave 0.7s ease-in-out infinite; }
    .wbar:nth-child(2){animation-delay:.08s}
    .wbar:nth-child(3){animation-delay:.16s}
    .wbar:nth-child(4){animation-delay:.24s}
    .wbar:nth-child(5){animation-delay:.12s}
    .wbar:nth-child(6){animation-delay:.04s}
    .wbar:nth-child(7){animation-delay:.2s}
    @keyframes wave { 0%,100%{height:4px} 50%{height:18px} }

    /* ── Transcript ── */
    .transcript-wrap {
      margin: 10px 16px 0;
    }
    .transcript-label {
      font-size: 8px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    #transcript {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      min-height: 44px;
      line-height: 1.6;
      font-family: 'Space Mono', monospace;
      word-break: break-word;
    }
    #transcript.has-text { color: var(--text); }

    /* ── Word queue ── */
    .queue-wrap {
      margin: 8px 16px 14px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      min-height: 26px;
    }
    .word-chip {
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface);
      transition: all 0.2s;
    }
    .word-chip.done    { color: var(--muted); opacity: 0.4; }
    .word-chip.current { color: var(--accent2); border-color: var(--accent2); background: rgba(6,182,212,0.1); }
    .word-chip.pending { color: var(--text); border-color: var(--border); }

    /* ── Error/info banner ── */
    .banner {
      margin: 8px 16px 0;
      padding: 8px 12px;
      border-radius: 7px;
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      display: none;
      line-height: 1.5;
    }
    .banner.error { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: #fca5a5; display:block; }
    .banner.info  { background: rgba(6,182,212,0.08); border: 1px solid var(--accent2); color: var(--accent2); display:block; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-row">
      <div class="logo">🤟</div>
      <div>
        <div class="title">MIDAS</div>
        <div class="subtitle">Sign Language Translator</div>
      </div>
      <div class="status-pill">
        <div class="dot offline" id="statusDot"></div>
        <span id="statusText">offline</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <div class="control-label">Source</div>
      <select id="source">
        <option value="tab">🔊 Tab Audio</option>
        <option value="mic">🎙️ Microphone</option>
      </select>
    </div>
    <div class="control-group">
      <div class="control-label">Language</div>
      <select id="lang">
        <option value="ASL">ASL</option>
        <option value="ISL">ISL</option>
      </select>
    </div>
    <button id="startBtn">▶ Start</button>
  </div>

  <div id="banner" class="banner"></div>

  <!-- Waveform -->
  <div class="waveform">
    <div class="wbar" id="w1"></div>
    <div class="wbar" id="w2"></div>
    <div class="wbar" id="w3"></div>
    <div class="wbar" id="w4"></div>
    <div class="wbar" id="w5"></div>
    <div class="wbar" id="w6"></div>
    <div class="wbar" id="w7"></div>
  </div>

  <!-- Avatar -->
  <div class="avatar-wrap">
    <canvas id="avatarCanvas" height="200"></canvas>
    <div class="canvas-label">HAND AVATAR</div>
    <div class="current-word" id="currentWord">—</div>
  </div>

  <!-- Transcript -->
  <div class="transcript-wrap">
    <div class="transcript-label">Transcript</div>
    <div id="transcript">Waiting for audio…</div>
  </div>

  <!-- Word chips -->
  <div class="queue-wrap" id="wordQueue"></div>

  <script src="sidebar.js"></script>
</body>
</html>
